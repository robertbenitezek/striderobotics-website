<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Roboto Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">

    <title>Stride Robotics</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #071B2F;
            color: white;
            font-family: 'Roboto', sans-serif;

            display: flex;
            justify-content: center;
            align-items: center;

            height: 100vh;
            text-align: center;
        }

        .container {
            max-width: 900px;
            padding: 20px;
        }

        h1 {
            font-size: 5rem;
            font-weight: 700;
            letter-spacing: 2px;
            margin-bottom: 28px;
        }

        h2 {
            font-size: 2rem;
            font-weight: 400;
            margin-bottom: 18px;
            color: white;
        }

        p {
            font-size: 1.1rem;
            font-weight: 300;
            line-height: 1.7;
            color: #9EB1C8;
            max-width: 700px;
            margin: 0 auto;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>Stride Robotics</h1>

    <h2>Engineering the future of hockey.</h2>

    <p>
        Elevating the game of hockey with the next generation of intelligent systems.
    </p>
</div>

</body>
</html>
